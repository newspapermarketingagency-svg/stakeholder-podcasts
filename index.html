<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcast Coverflow</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0d14;
    font-family: 'Manrope', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  .stage {
    position: relative;
    width: 100%;
    max-width: 620px;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1000px;
    perspective-origin: 50% 50%;
  }

  .card {
    position: absolute;
    width: 170px;
    height: 170px;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    will-change: transform, opacity;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1),
                opacity 0.5s ease,
                width 0.5s ease,
                height 0.5s ease,
                box-shadow 0.5s ease;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    border-radius: 10px;
    transition: filter 0.25s ease;
  }

  /* Play overlay */
  .card .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0);
    transition: background 0.25s ease;
    border-radius: 10px;
    pointer-events: none;
  }

  .card .play-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #FFD700;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 0.25s ease, transform 0.25s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }

  .card .play-btn svg {
    width: 22px;
    height: 22px;
    fill: #fff;
    margin-left: 3px;
  }

  /* Only show hover effect on the active (centre) card */
  .card[data-pos="0"]:hover img {
    filter: brightness(0.6);
  }

  .card[data-pos="0"]:hover .play-overlay {
    background: rgba(0,0,0,0.15);
  }

  .card[data-pos="0"]:hover .play-btn {
    opacity: 1;
    transform: scale(1);
  }

  .card[data-pos="0"] .play-btn:hover {
    transform: scale(1.08) !important;
  }

  /* Position states */
  .card[data-pos="-2"] {
    transform: translateX(-280px) translateZ(-140px) rotateY(52deg);
    opacity: 0.35;
    z-index: 1;
    width: 130px; height: 130px;
  }
  .card[data-pos="-1"] {
    transform: translateX(-168px) translateZ(-60px) rotateY(42deg);
    opacity: 0.7;
    z-index: 2;
    width: 150px; height: 150px;
  }
  .card[data-pos="0"] {
    transform: translateX(0) translateZ(20px) rotateY(0deg);
    opacity: 1;
    z-index: 5;
    width: 190px; height: 190px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.9);
  }
  .card[data-pos="1"] {
    transform: translateX(168px) translateZ(-60px) rotateY(-42deg);
    opacity: 0.7;
    z-index: 2;
    width: 150px; height: 150px;
  }
  .card[data-pos="2"] {
    transform: translateX(280px) translateZ(-140px) rotateY(-52deg);
    opacity: 0.35;
    z-index: 1;
    width: 130px; height: 130px;
  }
  .card[data-pos="-3"],
  .card[data-pos="3"],
  .card[data-pos="-4"],
  .card[data-pos="4"] {
    transform: translateX(0) translateZ(-400px);
    opacity: 0;
    pointer-events: none;
    z-index: 0;
  }

  .reflection-wrap {
    width: 100%;
    max-width: 620px;
    height: 50px;
    position: relative;
    display: flex;
    justify-content: center;
    overflow: hidden;
    margin-top: -8px;
    pointer-events: none;
  }

  #reflection {
    position: absolute;
    top: 0;
    width: 190px;
    height: 190px;
    object-fit: cover;
    border-radius: 10px;
    transform: scaleY(-1);
    opacity: 0.15;
    -webkit-mask-image: linear-gradient(to bottom, black 0%, transparent 70%);
    mask-image: linear-gradient(to bottom, black 0%, transparent 70%);
  }

  .info {
    margin-top: 10px;
    text-align: center;
    min-height: 48px;
  }

  .info .title {
    font-size: 17px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 3px;
  }

  .info .publisher {
    font-size: 12px;
    font-weight: 600;
    color: #c9a84c;
    letter-spacing: 0.04em;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 520px;
    margin-top: 18px;
    gap: 14px;
    padding: 0 8px;
  }

  .nav-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    transition: color 0.2s, transform 0.1s;
    flex-shrink: 0;
    line-height: 1;
  }
  .nav-btn:hover { color: #fff; }
  .nav-btn:active { transform: scale(0.88); }

  .dot-track {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 3px;
    position: relative;
    cursor: pointer;
  }

  .dot-track-inner {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: #FFD700;
    border-radius: 3px;
    transition: width 0.4s ease;
  }
</style>
</head>
<body>

<div class="stage" id="stage"></div>

<div class="reflection-wrap">
  <img id="reflection" src="" alt="">
</div>

<div class="info">
  <div class="title" id="podtitle"></div>
  <div class="publisher" id="publisher"></div>
</div>

<div class="bottom-bar">
  <button class="nav-btn" id="prev">&#9664;</button>
  <div class="dot-track" id="dotTrack">
    <div class="dot-track-inner" id="dotTrackInner"></div>
  </div>
  <button class="nav-btn" id="next">&#9654;</button>
</div>

const podcasts = [
  { publisher: 'News UK · The Times', title: 'The Game', spotifyId: '5DtlPY1ctacnQeuZoYLzx5', art: artwork[0] },
  { publisher: 'Guardian', title: 'World Cup Daily', spotifyId: '6w8qWe0kjgHEHSWDSDGoLW', art: artwork[1] },
  { publisher: 'Daily Mail', title: "It's All Kicking Off!", spotifyId: '0r4omeoMfx1bgxQrwWMGe0', art: artwork[2] },
  { publisher: 'The Independent', title: 'Copa Independent', spotifyId: '5jeaN0rqkk2qSr1iTxGAZV', art: artwork[3] },
  { publisher: 'Reach · Mirror', title: 'All Out Football', spotifyId: '6apJzKrYeKPxGttLQQ0KT5', art: artwork[4] },
];

let current = 0;
const total = podcasts.length;
const stageEl = document.getElementById('stage');

podcasts.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.index = i;

  const img = document.createElement('img');
  img.src = p.art;
  img.alt = p.title;

  // Play overlay
  const overlay = document.createElement('div');
  overlay.className = 'play-overlay';
  const btn = document.createElement('div');
  btn.className = 'play-btn';
  btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  overlay.appendChild(btn);

  card.appendChild(img);
  card.appendChild(overlay);
  stageEl.appendChild(card);

  // Click: if not active, navigate; if active, open Spotify in new tab
  card.addEventListener('click', () => {
    if (i !== current) {
      goTo(i);
    } else {
      window.open('https://open.spotify.com/show/' + p.spotifyId, '_blank', 'noopener');
    }
  });
});

function getPos(i) {
  let diff = i - current;
  if (diff > total / 2) diff -= total;
  if (diff < -total / 2) diff += total;
  return diff;
}

function render() {
  stageEl.querySelectorAll('.card').forEach(card => {
    const i = parseInt(card.dataset.index);
    card.dataset.pos = Math.max(-4, Math.min(4, getPos(i)));
  });

  const p = podcasts[current];
  document.getElementById('podtitle').textContent = p.title;
  document.getElementById('publisher').textContent = p.publisher;
  document.getElementById('reflection').src = p.art;

  document.getElementById('dotTrackInner').style.width =
    ((current / (total - 1)) * 100) + '%';
}

function goTo(i) {
  current = ((i % total) + total) % total;
  render();
}

document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('next').addEventListener('click', () => goTo(current + 1));

document.getElementById('dotTrack').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  goTo(Math.round(ratio * (total - 1)));
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goTo(current - 1);
  if (e.key === 'ArrowRight') goTo(current + 1);
});

let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const d = tx - e.changedTouches[0].clientX;
  if (Math.abs(d) > 40) goTo(current + (d > 0 ? 1 : -1));
}, {passive:true});

render();
</script>
